<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vLive</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://unpkg.com/7.css">

        <script>
            function spawnWindow(url, title, notes = '') {
                const newWindow = document.createElement('div');
                newWindow.classList.add('window', 'active', 'glass');
                newWindow.setAttribute('style', '--w7-w-bg: rgba(255, 255, 255, 0.8); position: absolute; top: 100px; left: 100px; z-index: 1000; width: 820px; height: auto; display: flex; flex-direction: column;');
                newWindow.innerHTML = `
                    <div class="title-bar" style="user-select: none;">
                        <div class="title-bar-text">${title}</div>
                        <div class="title-bar-controls">
                            <button aria-label="Minimize"></button>
                            <button aria-label="Maximize" onclick="toggleMaximize(this.closest('.window'))"></button>
                            <button aria-label="Close" onclick="this.closest('.window').remove()"></button>
                        </div>
                    </div>
                    <div class="window-body" style="overflow: auto;">
                        <div style="width: 100%; aspect-ratio: 16/9; margin-bottom: 10px;">
                            <iframe src="${url}" allow="fullscreen" style="width: 100%; height: 100%; border: none;" id="program-frame"></iframe>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button onclick="frame = this.closest('.window-body').querySelector('iframe'); frame.requestFullscreen(); iframeFullscreen(frame);">Fullscreen</button>
                            <button onclick="window.open('${url}', '_blank')">Open in new tab</button>
                            <p style="margin: 0;">${notes}</p>
                        </div>
                    </div>
                `;
                document.body.appendChild(newWindow);
                
                newWindow.addEventListener('mousedown', () => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = '1000');
                    newWindow.style.zIndex = '10000';
                });
                
                makeWindowDraggable(newWindow); 
            }

            function iframeFullscreen(iframe) {
                    iframe.contentWindow.postMessage('vLiveRequestFullscreen', '*')
            }

            function toggleMaximize(windowEl) {
                if (windowEl.dataset.maximized === 'true') {
                    windowEl.style.top = windowEl.dataset.top;
                    windowEl.style.left = windowEl.dataset.left;
                    windowEl.style.width = windowEl.dataset.width;
                    windowEl.style.height = windowEl.dataset.height;
                    windowEl.dataset.maximized = 'false';
                } else {
                    windowEl.dataset.top = windowEl.style.top;
                    windowEl.dataset.left = windowEl.style.left;
                    windowEl.dataset.width = windowEl.style.width;
                    windowEl.dataset.height = windowEl.style.height;
                    windowEl.style.top = '0';
                    windowEl.style.left = '0';
                    windowEl.style.width = '100vw';
                    windowEl.style.height = '100vh';
                    windowEl.dataset.maximized = 'true';
                }
            }

            function makeWindowDraggable(windowEl) {
                const titleBar = windowEl.querySelector('.title-bar');
                let offsetX = 0, offsetY = 0;

                titleBar.addEventListener('mousedown', (e) => {
                    offsetX = e.clientX - windowEl.offsetLeft;
                    offsetY = e.clientY - windowEl.offsetTop;

                    const onMouseMove = (e) => {
                        windowEl.style.left = (e.clientX - offsetX) + 'px';
                        windowEl.style.top = (e.clientY - offsetY) + 'px';
                    };

                    const onMouseUp = () => {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                    };

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            }

            function spawnCreditsWindow() {
                const newWindow = document.createElement('div');
                newWindow.classList.add('window', 'active', 'glass');
                newWindow.setAttribute('style', '--w7-w-bg: rgba(255, 255, 255, 0.8); position: absolute; top: 100px; left: 100px; z-index: 1000; width: 400px; height: auto; display: flex; flex-direction: column;');
                newWindow.innerHTML = `
                    <div class="title-bar" style="user-select: none;">
                        <div class="title-bar-text">vLive Credits</div>
                        <div class="title-bar-controls">
                            <button aria-label="Minimize"></button>
                            <button aria-label="Maximize" onclick="toggleMaximize(this.closest('.window'))"></button>
                            <button aria-label="Close" onclick="this.closest('.window').remove()"></button>
                        </div>
                    </div>
                    <div class="window-body" style="overflow: auto;">
                        <section class="tabs">
                            <h2>vLive credits</h2>
                            <fieldset>
                                <legend>Website credits</legend>
                                <ul>
                                    <li>7.css (website appearance) - github user <a href="https://github.com/khang-nd">khang-nd</a></li>
                                </ul>
                            </fieldset>

                            <fieldset>
                                <legend>Application credits</legend>
                                <ul>
                                    <li>Pizza Tower, ULTRAKILL - github user <a href="https://github.com/genizy">genizy</a></li>
                                    <li>Balatro - could not find source</li>
                                </ul>
                            </fieldset>
                        </section>
                    </div>
                `;
                document.body.appendChild(newWindow);

                newWindow.addEventListener('mousedown', () => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = '1000');
                    newWindow.style.zIndex = '10000';
                });

                makeWindowDraggable(newWindow);
            }

            window.addEventListener("beforeunload", () => {
                event.preventDefault();
                event.returnValue = '';
            });
        </script>
    </head>

    <body>
        <div class="window active glass" style="--w7-w-bg: rgba(255, 255, 255, 0.8);">
            <div class="title-bar">
                <div class="title-bar-text">vLive Dashboard</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close" onclick="alert(`i can't close the page myself, do it yourself`)"></button>
                </div>
            </div>
            <div class="window-body">
                <h1>vLive Dashboard</h1>
                <p>Select an application to open.</p>
                <div class="grid-container">
                    <div class="grid-item">
                        <img src="applications/pizza-tower/icon.png" alt="" class="grid-item-icon">
                        <h2>Pizza Tower</h2>
                        <p>[No description]</p>
                        <button onclick="spawnWindow('applications/pizza-tower/index.html', 'Pizza Tower', 'Game automatically switches to fullscreen. Press F11 to exit fullscreen.')">Open</button>
                    </div>

                    <div class="grid-item">
                        <img src="applications/ultrakill/icon.png" alt="ULTRAKILL" class="grid-item-icon">
                        <h2>ULTRAKILL</h2>
                        <p>[No description]</p>
                        <button onclick="spawnWindow('applications/ultrakill/index.html', 'ULTRAKILL', 'This is an older version of the game.')">Open</button>
                    </div>

                    <div class="grid-item">
                        <img src="applications/balatro/icon.png" alt="Balatro" class="grid-item-icon">
                        <h2>Balatro</h2>
                        <p>[No description]</p>
                        <button onclick="spawnWindow('applications/balatro/index.html', 'Balatro', 'Window sizing is broken. Use fullscreen if possible.')">Open</button>
                    </div>
                </div>

                <button onclick="spawnCreditsWindow()">show vLive credits</button>
                <button onclick="spawnWindow('https://forms.gle/9G8j42HBbaf88cPb6', 'vLive suggestions form', 'if the connection is blocked use the new tab button')">vLive suggestions form</button>
                <button onclick="spawnWindow('https://docs.google.com/spreadsheets/d/1WRiRyThavbPfwygSR6qGYnY0Z2Ex1vhonqd29iOfX_Y/edit?usp=sharing', 'form responses', 'if connection is blocked press new tab')">form responses</button>
            </div>
        </div>
    </body>
</html>
