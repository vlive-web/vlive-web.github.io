<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vLive</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://unpkg.com/7.css">

        <script>
            function spawnEmbedWindow(url, title, notes = '') {
                const newWindow = document.createElement('div');
                newWindow.classList.add('window', 'active', 'glass');
                newWindow.setAttribute('style', '--w7-w-bg: rgba(255, 255, 255, 0.8); position: absolute; top: 100px; left: 100px; z-index: 1000; width: 820px; height: auto; display: flex; flex-direction: column;');
                newWindow.innerHTML = `
                    <div class="title-bar" style="user-select: none;">
                        <div class="title-bar-text">${title}</div>
                        <div class="title-bar-controls">
                            <button aria-label="Minimize"></button>
                            <button aria-label="Maximize" onclick="toggleMaximize(this.closest('.window'))"></button>
                            <button aria-label="Close" onclick="this.closest('.window').remove()"></button>
                        </div>
                    </div>
                    <div class="window-body" style="overflow: auto;">
                        <div style="width: 100%; aspect-ratio: 16/9; margin-bottom: 10px;">
                            <iframe src="${url}" allow="fullscreen" style="width: 100%; height: 100%; border: none;" id="program-frame"></iframe>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button onclick="frame = this.closest('.window-body').querySelector('iframe'); frame.requestFullscreen(); iframeFullscreen(frame);">Fullscreen</button>
                            <button onclick="window.open('${url}', '_blank')">Open in new tab</button>
                            <p style="margin: 0;">${notes}</p>
                        </div>
                    </div>
                `;
                document.body.appendChild(newWindow);
                
                newWindow.addEventListener('mousedown', () => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = '1000');
                    newWindow.style.zIndex = '10000';
                });
                
                makeWindowDraggable(newWindow); 
            }

            function iframeFullscreen(iframe) {
                    iframe.contentWindow.postMessage('vLiveRequestFullscreen', '*')
            }

            function toggleMaximize(windowEl) {
                if (windowEl.dataset.maximized === 'true') {
                    windowEl.style.top = windowEl.dataset.top;
                    windowEl.style.left = windowEl.dataset.left;
                    windowEl.style.width = windowEl.dataset.width;
                    windowEl.style.height = windowEl.dataset.height;
                    windowEl.dataset.maximized = 'false';
                } else {
                    windowEl.dataset.top = windowEl.style.top;
                    windowEl.dataset.left = windowEl.style.left;
                    windowEl.dataset.width = windowEl.style.width;
                    windowEl.dataset.height = windowEl.style.height;
                    windowEl.style.top = '0';
                    windowEl.style.left = '0';
                    windowEl.style.width = '100vw';
                    windowEl.style.height = '100vh';
                    windowEl.dataset.maximized = 'true';
                }
            }

            function makeWindowDraggable(windowEl) {
                const titleBar = windowEl.querySelector('.title-bar');
                let offsetX = 0, offsetY = 0;

                titleBar.addEventListener('mousedown', (e) => {
                    offsetX = e.clientX - windowEl.offsetLeft;
                    offsetY = e.clientY - windowEl.offsetTop;

                    const onMouseMove = (e) => {
                        windowEl.style.left = (e.clientX - offsetX) + 'px';
                        windowEl.style.top = (e.clientY - offsetY) + 'px';
                    };

                    const onMouseUp = () => {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                    };

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            }

            function spawnCreditsWindow() {
                const newWindow = document.createElement('div');
                newWindow.classList.add('window', 'active', 'glass');
                newWindow.setAttribute('style', '--w7-w-bg: rgba(50, 255, 50, 0.9); position: absolute; top: 100px; left: 100px; z-index: 1000; width: 400px; height: auto; display: flex; flex-direction: column;');
                newWindow.innerHTML = `
                    <div class="title-bar" style="user-select: none;">
                        <div class="title-bar-text">vLive Credits</div>
                        <div class="title-bar-controls">
                            <button aria-label="Minimize"></button>
                            <button aria-label="Maximize" onclick="toggleMaximize(this.closest('.window'))"></button>
                            <button aria-label="Close" onclick="this.closest('.window').remove()"></button>
                        </div>
                    </div>
                    <div class="window-body" style="overflow: auto;">
                        <section class="tabs">
                            <h2>vLive credits</h2>
                            <fieldset>
                                <legend>Website credits</legend>
                                <ul>
                                    <li>7.css (website appearance) - github user <a href="https://github.com/khang-nd">khang-nd</a></li>
                                    <li>Segoe UI (the main font used on the website) is a Microsoft font.</li>
                                </ul>
                            </fieldset>

                            <fieldset>
                                <legend>Program credits</legend>
                                <section class="tabs">
                                    <menu role="tablist" aria-label="Program credits tabs">
                                        <button role="tab" aria-selected="true" aria-controls="games-credits-tab">Games</button>
                                    </menu>
                                    <article role="tabpanel" id="games-credits-tab">
                                        <table>
                                            <tr>
                                                <th>Game</th>
                                                <th>Original developer</th>
                                                <th>Web port source</th>
                                            </tr>
                                            <tr>
                                                <td>Pizza Tower</td>
                                                <td>Tour De Pizza</td>
                                                <td><a href="https://github.com/genizy">genizy</a></td>
                                            </tr>
                                            <tr>
                                                <td>ULTRAKILL</td>
                                                <td>Arsi "Hakita" Patala, New Blood Interactive</td>
                                                <td><a href="https://github.com/genizy">genizy</a></td>
                                            </tr>
                                            <tr>
                                                <td>Balatro</td>
                                                <td>LocalThunk</td>
                                                <td>unknown</td>
                                            </tr>
                                            <tr>
                                                <td>Cuphead</td>
                                                <td>Studio MDHR</td>
                                                <td><a href="https://github.com/genizy">genizy</a></td>
                                            </tr>
                                            <tr>
                                                <td>Baldi's Basics Plus</td>
                                                <td>Micah McGonigal (Mystman12)</td>
                                                <td><a href="https://github.com/genizy">genizy</a></td>
                                            </tr>
                                            <tr>
                                                <td>HOTLINE MIAMI</td>
                                                <td>Dennaton Games</td>
                                                <td><a href="https://github.com/genizy">genizy</a></td>
                                            </tr>
                                        </table>
                                    </article>
                                </section>
                            </fieldset>
                        </section>
                    </div>
                `;
                document.body.appendChild(newWindow);

                newWindow.addEventListener('mousedown', () => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = '1000');
                    newWindow.style.zIndex = '10000';
                });

                makeWindowDraggable(newWindow);
            }

            window.addEventListener("beforeunload", () => {
                event.preventDefault();
                event.returnValue = '';
            });

            var closeAttempts = 0;

            function attemptCloseWebpage() {
                if (closeAttempts == 0) {
                    alert("do i have to do everything for you");
                } else if (closeAttempts == 1) {
                    alert("close the tab. i can't do it for you.");
                } else if (closeAttempts == 2) {
                    alert("seriously, they don't let me close the tab for you. just press the little close button on the tab.");
                } else if (closeAttempts == 3) {
                    alert("i can close the dashboard window. that's not the tab. you'll just have a green background.");
                } else if (closeAttempts == 4) {
                    confirm("do you want that?") ? finalCloseAttempt() : closeAttempts = 2;
                }
                closeAttempts++;
            }

            function finalCloseAttempt() {
                document.querySelector('.window.active').remove();
                finalCloseAttemptMessage();
            }

            async function finalCloseAttemptMessage() {
                const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
                wait(3000);
                alert("this is what you wanted.");
            }

            function initTabs() {
                document.querySelectorAll('.tabs').forEach(tabGroup => {
                    const tabs = tabGroup.querySelectorAll('[role="tab"]');
                    const panels = tabGroup.querySelectorAll('[role="tabpanel"]');
                    if (!tabs.length || !panels.length) return;

                    tabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
                            tab.setAttribute('aria-selected', 'true');

                            panels.forEach(panel => panel.hidden = true);

                            const panelId = tab.getAttribute('aria-controls');
                            const panel = document.getElementById(panelId);
                            if (panel) {
                                panel.hidden = false;
                            }
                        });
                    });
                });
            }

            document.addEventListener('DOMContentLoaded', initTabs);
        </script>
    </head>

    <body style="background-color:#004400;">
        <div class="window active glass" style="--w7-w-bg: rgba(50, 255, 50, 0.9); background: rgba(0, 0, 0, 0); position: fixed; top: 15px; left: 15px; width: calc(100vw - 30px); height: calc(100vh - 30px); display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text">vLive Dashboard</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close" onclick="attemptCloseWebpage()"></button>
                </div>
            </div>
            <div class="window-body" style="flex: 1; overflow: auto;">
                <h2>Select a program to open.</h2>
                <p>Programs opened appear in windows.</p>
                <section class="tabs">
                    <menu role="tablist" aria-label="Program tabs">
                        <button role="tab" aria-selected="true" aria-controls="games-tab">Games</button>
                        <button role="tab" aria-controls="emulators-tab">Emulators</button>
                    </menu>
                    <article role="tabpanel" id="games-tab">
                        <div class="vLive-dashboard-v2-program-selector">
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/pizza-tower/icon.png" alt="Pizza Tower game icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>Pizza Tower</h2>
                                    <button onclick="spawnEmbedWindow('applications/pizza-tower/index.html', 'Pizza Tower', 'Game automatically switches to fullscreen. Press F11 to exit fullscreen.')">Open</button>
                                </div>
                            </div>
                            <hr>
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/ultrakill/icon.png" alt="ULTRAKILL game icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>ULTRAKILL</h2>
                                    <button onclick="spawnEmbedWindow('applications/ultrakill/index.html', 'ULTRAKILL', 'This is an older version of the game.')">Open</button>
                                </div>
                            </div>
                            <hr>
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/balatro/icon.png" alt="Balatro game icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>Balatro</h2>
                                    <button onclick="spawnEmbedWindow('applications/balatro/index.html', 'Balatro', 'Window sizing is broken. Open in new tab, and then toggle fullscreen.')">Open</button>
                                </div>
                            </div>
                            <hr>
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/cuphead/icon.png" alt="Cuphead game icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>Cuphead</h2>
                                    <button onclick="spawnEmbedWindow('applications/cuphead/index.html', 'Cuphead', 'Needs a higher powered computer. The average school Chromebook is not enough.')">Open</button>
                                </div>
                            </div>
                            <hr>
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/baldi-plus/icon.png" alt="Baldi's Basics Plus game icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>Baldi's Basics Plus</h2>
                                    <button onclick="spawnEmbedWindow('applications/baldi-plus/index.html', 'Baldi\'s Basics Plus', 'This is an older version of the game. Open in new tab for better performance.')">Open</button>
                                </div>
                            </div>
                            <hr>
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/hotline-miami/icon.png" alt="HOTLINE MIAMI game icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>HOTLINE MIAMI</h2>
                                    <button onclick="spawnEmbedWindow('applications/hotline-miami/index.html', 'HOTLINE MIAMI', 'This is an older version of the game. Open in new tab for better performance.')">Open</button>
                                </div>
                            </div>
                        </div>
                    </article>
                    <article role="tabpanel" id="emulators-tab" hidden>
                        <div class="vlive-dashboard-v2-program-selector">
                            <div class="vlive-dashboard-v2-program-selector-item-container">
                                <img src="applications/webnes/icon.png" alt="NES emulator icon">
                                <div class="vlive-dashboard-v2-program-selector-item-details-container">
                                    <h2>NES</h2>
                                    <button onclick="spawnEmbedWindow('applications/webnes/index.html', 'WebNES emulator', 'vLive does not supply game ROM files. Provide your own.')">Open</button>
                                </div>
                            </div>
                        </div>
                    </article>
                </section>
                <br>
                <p>Program you want not on the list?</p>
                <button onclick="spawnEmbedWindow('https://forms.gle/9G8j42HBbaf88cPb6', 'vLive suggestions form', 'if the connection is blocked use the new tab button')">Request</button>
                <button onclick="spawnEmbedWindow('https://docs.google.com/spreadsheets/d/1WRiRyThavbPfwygSR6qGYnY0Z2Ex1vhonqd29iOfX_Y/edit?usp=sharing', 'all suggestions', 'if connection is blocked press new tab')">View all requests</button>

                <br>
                <br>
                <br>

                <button onclick="spawnCreditsWindow()">vLive credits</button>
                <button onclick="spawnWindow('https://github.com/vlive-web/vlive-web.github.io', 'vLive source code', '')">vLive source code</button>
            </div>
        </div>
    </body>
</html>
